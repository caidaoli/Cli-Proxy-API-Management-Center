name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate release tag
        run: |
          set -euo pipefail
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "release tag must be an exact stable semantic version such as v1.58.0" >&2
            exit 1
          fi

      - name: Update model pricing
        run: npm run pricing:update

      - name: Build all-in-one HTML
        run: npm run build
        env:
          VERSION: ${{ github.ref_name }}

      - name: Prepare release assets
        run: |
          set -euo pipefail
          cd dist
          mv index.html management.html
          sha256="$(sha256sum management.html | awk '{print $1}')"
          printf '%s  management.html\n' "$sha256" > management.html.sha256
          PANEL_VERSION="${GITHUB_REF_NAME}" PANEL_SHA256="$sha256" node --input-type=module <<'NODE'
          import { writeFileSync } from 'node:fs';

          const manifest = {
            version: process.env.PANEL_VERSION,
            sha256: process.env.PANEL_SHA256,
            asset: 'management.html'
          };
          writeFileSync('panel-manifest.json', JSON.stringify(manifest, null, 2) + '\n');
          NODE
          ls -lh management.html management.html.sha256 panel-manifest.json

      - name: Generate release notes
        run: |
          set -euo pipefail
          current_tag="${GITHUB_REF_NAME}"
          previous_tag="$(git tag --list 'v*' --sort=-v:refname | grep -v "^${current_tag}$" | head -n 1 || true)"
          if [ -n "${previous_tag}" ]; then
            range="${previous_tag}..${current_tag}"
          else
            range="${current_tag}"
          fi

          : > release-notes.md
          git log --pretty=format:"- %h %s" "${range}" >> release-notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/management.html
            dist/management.html.sha256
            dist/panel-manifest.json
          body_path: release-notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
